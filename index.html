<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>BLE Keyboard Config</title>

        <style>
            body{
                font-family: Arial;
                max-width:800px;
                margin:auto;
                padding:20px;
            }

            h2{
                color:#333;
            }

            .card{
                border:1px solid #ddd;
                border-radius:10px;
                padding:20px;
                margin-top:20px;
            }

            select{
                width:200px;
                height:35px;
                margin:10px;
            }

            button{
                height:40px;
                padding:0 20px;
                margin:10px;
            }

            .status{
                color:green;
                font-weight:bold;
            }

            .mod-group{
                margin:2px 0 8px 20px;
                font-size:0.9em;
            }
            .mod-group label{
                margin-right:10px;
                white-space:nowrap;
            }
        </style>

    </head>
    <body>
        <h2>BLE Keyboard Config Tool</h2>

        <div class="card">            
            <button onclick="connectBLE()">
                Connect Keyboard
            </button>

            <button onclick="disconnectBLE()">
                Disconnect Keyboard
            </button>

            <span id="status" class="status">
                Not Connected
            </span>
        </div>

        <div class="card">

        <h3>Layer 0</h3>

            <label>A Key</label>
            <select id="keyA"></select>
            <br>

            <label>B Key</label>
            <select id="keyB"></select>
            <br>

            <label>C Key</label>
            <select id="keyC"></select>
            <br>

            <label>D Key</label>
            <select id="keyD"></select>
            <br>

            <label>E Key (BTN1)</label>
            <select id="keyE"></select>
            <br>

            <label>F Key (BTN2)</label>
            <select id="keyF"></select>
            <br>

            <button onclick="saveConfig()">
                Save Config
            </button>

            <button onclick="readConfig()">
                Read Config
            </button>

        </div>

        <script>

            let device = null;
            let server = null;
            let characteristic = null;
            /*
            HID Key Table
            */
            const keyTable = [
                {name:"-- None --", value:0},
                {name:"A", value:4},
                {name:"B", value:5},
                {name:"C", value:6},
                {name:"D", value:7},
                {name:"E", value:8},
                {name:"F", value:9},
                {name:"G", value:10},
                {name:"H", value:11},
                {name:"I", value:12},
                {name:"J", value:13},
                {name:"K", value:14},
                {name:"L", value:15},
                {name:"M", value:16},
                {name:"N", value:17},
                {name:"O", value:18},
                {name:"P", value:19},
                {name:"Q", value:20},
                {name:"R", value:21},
                {name:"S", value:22},
                {name:"T", value:23},
                {name:"U", value:24},
                {name:"V", value:25},
                {name:"W", value:26},
                {name:"X", value:27},
                {name:"Y", value:28},
                {name:"Z", value:29},

                {name:"1", value:30},
                {name:"2", value:31},
                {name:"3", value:32},
                {name:"4", value:33},
                {name:"5", value:34},
                {name:"6", value:35},
                {name:"7", value:36},
                {name:"8", value:37},
                {name:"9", value:38},
                {name:"0", value:39},

                {name:"Enter", value:40},
                {name:"Esc", value:41},
                {name:"Backspace", value:42},
                {name:"Tab", value:43},
                {name:"Space", value:44},
                {name:"Caps Lock", value:57},

                {name:"F1", value:58},
                {name:"F2", value:59},
                {name:"F3", value:60},
                {name:"F4", value:61},
                {name:"F5", value:62},
                {name:"F6", value:63},
                {name:"F7", value:64},
                {name:"F8", value:65},
                {name:"F9", value:66},
                {name:"F10", value:67},
                {name:"F11", value:68},
                {name:"F12", value:69},

                {name:"Delete", value:76},
                
                {name:"Right Arrow", value:79},
                {name:"Left Arrow", value:80},
                {name:"Down Arrow", value:81},
                {name:"Up Arrow", value:82},

                {name:"Left Ctrl", value:224},
                {name:"Left Shift", value:225},
                {name:"Left Alt", value:226},
                {name:"Left Win", value:227},
                {name:"Right Ctrl", value:228},
                {name:"Right Shift", value:229},
                {name:"Right Alt", value:230},
                {name:"Right Win", value:231}
            ];
            // Initialize the select elements with options from the keyTable
            function initSelect(id)
            {
                let sel = document.getElementById(id);

                keyTable.forEach(item=>{
                    let option = document.createElement("option");
                    option.value = item.value;
                    option.text = item.name;
                    sel.appendChild(option);
                });
            }

            initSelect("keyA");
            initSelect("keyB");
            initSelect("keyC");
            initSelect("keyD");
            initSelect("keyE");
            initSelect("keyF");

            /* Modifier table — maps HID report byte0 bit positions. */
            const modTable = [
                {name: "LCtrl",  bit: 0},
                {name: "LShift", bit: 1},
                {name: "LAlt",   bit: 2},
                {name: "LWin",   bit: 3},
                {name: "RCtrl",  bit: 4},
                {name: "RShift", bit: 5},
                {name: "RAlt",   bit: 6},
                {name: "RWin",   bit: 7}
            ];

            /* Per-key checkbox references: modCheckboxes['A'][0..7] etc. */
            const modCheckboxes = { A: [], B: [], C: [], D: [], E: [], F: [] };

            function createModCheckboxes(selectId, keyName)
            {
                const select = document.getElementById(selectId);
                const div = document.createElement("div");
                div.className = "mod-group";
                div.appendChild(document.createTextNode("Modifiers: "));
                modTable.forEach(m => {
                    const label = document.createElement("label");
                    const cb = document.createElement("input");
                    cb.type = "checkbox";
                    cb.id = "mod_" + keyName + "_" + m.name;
                    label.appendChild(cb);
                    label.appendChild(document.createTextNode(" " + m.name));
                    div.appendChild(label);
                    modCheckboxes[keyName].push(cb);
                });
                select.parentNode.insertBefore(div, select.nextSibling);
            }

            createModCheckboxes("keyA", "A");
            createModCheckboxes("keyB", "B");
            createModCheckboxes("keyC", "C");
            createModCheckboxes("keyD", "D");
            createModCheckboxes("keyE", "E");
            createModCheckboxes("keyF", "F");

            /* Pack checkbox states into a modifier bitmask byte. */
            function packMod(keyName)
            {
                let mod = 0;
                modCheckboxes[keyName].forEach((cb, i) => {
                    if (cb.checked) mod |= (1 << i);
                });
                return mod;
            }

            /* Unpack a modifier bitmask byte into checkbox states. */
            function unpackMod(value, keyName)
            {
                modCheckboxes[keyName].forEach((cb, i) => {
                    cb.checked = (value & (1 << i)) !== 0;
                });
            }
            async function connectBLE()
            {
                const SERVICE_UUID = '12345678-1234-5678-1234-56789abcdef0';
                const CHAR_UUID = '12345679-1234-5678-1234-56789abcdef0';

                try {
                    device = await navigator.bluetooth.requestDevice({
                        filters: [{ services: [SERVICE_UUID] }],
                        optionalServices: [SERVICE_UUID]
                    });

                    device.addEventListener('gattserverdisconnected', () => {
                        document.getElementById('status').innerText = 'Disconnected';
                        characteristic = null;
                        server = null;
                        console.warn('GATT server disconnected');
                    });

                    // Try to connect (with simple retry)
                    for (let attempt = 0; attempt < 3; attempt++) {
                        try {
                            server = await device.gatt.connect();
                            if (device.gatt.connected) break;
                        } catch (err) {
                            console.warn('connect attempt', attempt, err);
                        }
                        await new Promise(r => setTimeout(r, 300));
                    }

                    if (!server || !device.gatt.connected) {
                        throw new Error('Unable to connect to GATT server');
                    }

                    const service = await server.getPrimaryService(SERVICE_UUID);
                    characteristic = await service.getCharacteristic(CHAR_UUID);

                    document.getElementById('status').innerText = 'Connected';
                    alert('Keyboard Connected');
                } catch (err) {
                    if (err && err.name === 'NotFoundError') {
                        alert('未选择设备或没有匹配设备，请确认设备正在广播并选择设备。');
                    } else {
                        alert('连接失败：' + (err && err.message ? err.message : err));
                    }
                    console.error(err);
                }
            }

            async function disconnectBLE()
            {
                if (!device || !device.gatt || !device.gatt.connected) {
                    characteristic = null;
                    server = null;
                    document.getElementById('status').innerText = 'Disconnected';
                    alert('Keyboard already disconnected');
                    return;
                }

                device.gatt.disconnect();
                characteristic = null;
                server = null;
                document.getElementById('status').innerText = 'Disconnected';
                alert('Keyboard Disconnected');
            }

            async function saveConfig()
            {
                if(characteristic == null)
                {
                    alert("Please Connect First");
                    return;
                }

                let keyA =
                    parseInt(document.getElementById("keyA").value);

                let keyB =
                    parseInt(document.getElementById("keyB").value);

                let keyC =
                    parseInt(document.getElementById("keyC").value);

                let keyD =
                    parseInt(document.getElementById("keyD").value);

                let keyE =
                    parseInt(document.getElementById("keyE").value);

                let keyF =
                    parseInt(document.getElementById("keyF").value);

                /* 13-byte payload: layer + 6*(mod + key) */
                const data = new Uint8Array(13);
                data[0]  = 0;           // layer
                data[1]  = packMod('A');
                data[2]  = keyA;
                data[3]  = packMod('B');
                data[4]  = keyB;
                data[5]  = packMod('C');
                data[6]  = keyC;
                data[7]  = packMod('D');
                data[8]  = keyD;
                data[9]  = packMod('E');
                data[10] = keyE;
                data[11] = packMod('F');
                data[12] = keyF;

                await characteristic.writeValue(data);

                alert("Config Saved");
            }

            async function readConfig()
            {
                if(characteristic == null)
                {
                    alert("Please Connect First");
                    return;
                }

                const value =
                    await characteristic.readValue();

                /* Support both old 5-byte and new 9-byte formats. */
                if (value.byteLength === 5) {
                    /* Legacy 5-byte format: treat all mods as 0. */
                    const layer = value.getUint8(0);
                    const keyA  = value.getUint8(1);
                    const keyB  = value.getUint8(2);
                    const keyC  = value.getUint8(3);
                    const keyD  = value.getUint8(4);

                    document.getElementById("keyA").value = keyA;
                    document.getElementById("keyB").value = keyB;
                    document.getElementById("keyC").value = keyC;
                    document.getElementById("keyD").value = keyD;

                    unpackMod(0, 'A');
                    unpackMod(0, 'B');
                    unpackMod(0, 'C');
                    unpackMod(0, 'D');

                    alert("Layer=" + layer +
                          "\nA=" + keyA + " (mod=00)" +
                          "\nB=" + keyB + " (mod=00)" +
                          "\nC=" + keyC + " (mod=00)" +
                          "\nD=" + keyD + " (mod=00)" +
                          "\n\nNote: Read old 5-byte config. Save to upgrade.");
                    return;
                }

                /* Support 5-byte (v3), 9-byte (v4), and 13-byte (v4.1) formats. */
                if (value.byteLength === 9) {
                    /* v4 9-byte: A-D only, no E/F. */
                    const layer = value.getUint8(0);
                    const modA = value.getUint8(1);
                    const keyA = value.getUint8(2);
                    const modB = value.getUint8(3);
                    const keyB = value.getUint8(4);
                    const modC = value.getUint8(5);
                    const keyC = value.getUint8(6);
                    const modD = value.getUint8(7);
                    const keyD = value.getUint8(8);

                    document.getElementById("keyA").value = keyA;
                    document.getElementById("keyB").value = keyB;
                    document.getElementById("keyC").value = keyC;
                    document.getElementById("keyD").value = keyD;
                    document.getElementById("keyE").value = 0;
                    document.getElementById("keyF").value = 0;

                    unpackMod(modA, 'A'); unpackMod(modB, 'B');
                    unpackMod(modC, 'C'); unpackMod(modD, 'D');
                    unpackMod(0, 'E');    unpackMod(0, 'F');

                    alert("Layer=" + layer +
                          "\nA(mod=" + modA.toString(16).padStart(2,'0') + ",key=" + keyA + ")" +
                          "\nB(mod=" + modB.toString(16).padStart(2,'0') + ",key=" + keyB + ")" +
                          "\nC(mod=" + modC.toString(16).padStart(2,'0') + ",key=" + keyC + ")" +
                          "\nD(mod=" + modD.toString(16).padStart(2,'0') + ",key=" + keyD + ")" +
                          "\nE(mod=00,key=0)" +
                          "\nF(mod=00,key=0)" +
                          "\n\nNote: Read v4 9-byte config. Save to upgrade to v4.1.");
                    return;
                }

                if (value.byteLength !== 13) {
                    alert("Unexpected config size: " + value.byteLength +
                          " (expected 13 bytes). Firmware may be running an " +
                          "incompatible version.");
                    return;
                }

                const layer = value.getUint8(0);

                const modA = value.getUint8(1);
                const keyA = value.getUint8(2);
                const modB = value.getUint8(3);
                const keyB = value.getUint8(4);
                const modC = value.getUint8(5);
                const keyC = value.getUint8(6);
                const modD = value.getUint8(7);
                const keyD = value.getUint8(8);
                const modE = value.getUint8(9);
                const keyE = value.getUint8(10);
                const modF = value.getUint8(11);
                const keyF = value.getUint8(12);

                document.getElementById("keyA").value = keyA;
                document.getElementById("keyB").value = keyB;
                document.getElementById("keyC").value = keyC;
                document.getElementById("keyD").value = keyD;
                document.getElementById("keyE").value = keyE;
                document.getElementById("keyF").value = keyF;

                unpackMod(modA, 'A'); unpackMod(modB, 'B');
                unpackMod(modC, 'C'); unpackMod(modD, 'D');
                unpackMod(modE, 'E'); unpackMod(modF, 'F');

                alert(
                    "Layer=" + layer +
                    "\nA(mod=" + modA.toString(16).padStart(2,'0') +
                    ",key=" + keyA + ")" +
                    "\nB(mod=" + modB.toString(16).padStart(2,'0') +
                    ",key=" + keyB + ")" +
                    "\nC(mod=" + modC.toString(16).padStart(2,'0') +
                    ",key=" + keyC + ")" +
                    "\nD(mod=" + modD.toString(16).padStart(2,'0') +
                    ",key=" + keyD + ")" +
                    "\nE(mod=" + modE.toString(16).padStart(2,'0') +
                    ",key=" + keyE + ")" +
                    "\nF(mod=" + modF.toString(16).padStart(2,'0') +
                    ",key=" + keyF + ")"
                );
            }
        </script>
    </body>
</html>
